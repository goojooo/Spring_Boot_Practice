<div class="container">

<h2>Pending Partner Requests</h2>

<table border="1">

<tr>
<th>Name</th>
<th>Service</th>
<th>Experience</th>
<th>Action</th>
</tr>

<tr th:each="req : ${requests}">

<td th:text="${req.name}"></td>
<td th:text="${req.serviceType}"></td>
<td th:text="${req.experience}"></td>

<td>

<a th:href="@{/admin/approve/{id}(id=${req.id})}" class="btn">
Approve
</a>

<a th:href="@{/admin/reject/{id}(id=${req.id})}" class="btn">
Reject
</a>

</td>

</tr>

</table>

</div>
