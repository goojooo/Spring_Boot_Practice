<!DOCTYPE html>
<html>
<head>
<title>Partner Register</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="form-container">

<h2>Become a Partner 💼</h2>
<p class="form-subtext">Start earning with your skills</p>

<form action="/partner/register" method="post">

<div class="form-row">

<div class="form-group">
<label>Name</label>
<input type="text" name="name">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email">
</div>

</div>

<div class="form-row">

<div class="form-group">
<label>Phone</label>
<input type="text" name="phone">
</div>

<div class="form-group">
<label>Experience</label>
<input type="number" name="experience">
</div>

</div>

<div class="form-group">
<label>Service Type</label>
<input type="text" name="serviceType">
</div>

<button class="btn-primary full-btn">Submit Request</button>

</form>

</div>

</body>
</html>
