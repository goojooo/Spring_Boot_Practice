<!DOCTYPE html>
<html>
<head>
<title>Service Partner Registration</title>
</head>

<body>

<h2>Register as Service Partner</h2>

<form action="/partner/register" method="post">

Name:
<input type="text" name="name"><br><br>

Email:
<input type="email" name="email"><br><br>

Phone:
<input type="text" name="phone"><br><br>

Service Type:
<input type="text" name="serviceType"><br><br>

Experience (years):
<input type="number" name="experience"><br><br>

<button type="submit">Submit Request</button>

</form>

</body>
</html>
