<h2>Booking Requests</h2>

<table border="1">

<tr>
<th>Customer</th>
<th>Service</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr th:each="booking : ${bookings}">

<td th:text="${booking.customerName}"></td>

<td th:text="${booking.serviceType}"></td>

<td th:text="${booking.bookingDate}"></td>

<td th:text="${booking.status}"></td>

<td>

<span th:if="${booking.status == 'PENDING'}">
<a th:href="@{/partner/booking/accept/{id}(id=${booking.id})}">Accept</a>
<a th:href="@{/partner/booking/reject/{id}(id=${booking.id})}">Reject</a>
</span>

<span th:if="${booking.status == 'CONFIRMED'}">
<a th:href="@{/partner/booking/start/{id}(id=${booking.id})}">Start Work</a>
</span>

<span th:if="${booking.status == 'IN_PROGRESS'}">
<a th:href="@{/partner/booking/complete/{id}(id=${booking.id})}">Complete</a>
</span>

</td>

</tr>

</table>
