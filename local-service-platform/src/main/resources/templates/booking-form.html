<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Form</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="form-container">
  <h2>Book Service Slot</h2>
  <form action="/booking/create" method="post">
    <input type="hidden" name="partnerId" th:value="${booking.partnerId}">
    <div class="form-group">
      <label>Your Name</label>
      <input type="text" name="customerName" required>
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" name="bookingDate" required>
    </div>
    <div class="form-group">
      <label>Select Time Slot</label>
      <select name="timeSlot" required>
        <option value="">--Select--</option>
        <option value="9AM-11AM">9 AM - 11 AM</option>
        <option value="11AM-1PM">11 AM - 1 PM</option>
        <option value="2PM-4PM">2 PM - 4 PM</option>
        <option value="4PM-6PM">4 PM - 6 PM</option>
      </select>
    </div>
    <button class="btn-primary full-btn">Book Service</button>
  </form>
</div>

</body>
</html>
