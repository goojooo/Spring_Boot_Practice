<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Bookings</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
  <h2>My Bookings</h2>
  <table>
    <tr>
      <th>Service</th>
      <th>Date</th>
      <th>Status</th>
      <th>Time</th>
      <th>Action</th>
    </tr>
    <tr th:each="booking : ${bookings}">
      <td th:text="${booking.serviceType}"></td>
      <td th:text="${booking.bookingDate}"></td>
      <td th:text="${booking.status}"></td>
      <td th:text="${booking.timeSlot}"></td>
      <td>
        <span th:if="${booking.status == 'COMPLETED'}">
          <a th:href="@{/review/{id}(id=${booking.partnerId})}" class="btn btn-primary">Give Review</a>
        </span>
      </td>
    </tr>
  </table>
</div>

</body>
</html>
