<!DOCTYPE html>
<html>
<head>

<title>My Bookings</title>
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<h2>My Bookings</h2>

<table border="1">

<tr>
<th>Service</th>
<th>Date</th>
<th>Status</th>
<th>Time</th>
</tr>

<tr th:each="booking : ${bookings}">

<td th:text="${booking.serviceType}"></td>

<td th:text="${booking.bookingDate}"></td>

<td th:text="${booking.status}"></td>

<td th:text="${booking.timeSlot}"></td>

<td>

<span th:if="${booking.status == 'COMPLETED'}">
<a th:href="@{/review/{id}(id=${booking.partnerId})}">
Give Review
</a>
</span>

</td>
</tr>
</table>

setInterval(function(){

}, 5000);
</script>
-->
</body>
</html>
