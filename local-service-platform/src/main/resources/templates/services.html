<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Services</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<nav class="navbar">
  <h2>LocalServices</h2>
  <div>
    <a href="/">Home</a>
    <a href="/my-bookings">My Bookings</a>
  </div>
</nav>

<section class="page">

<h1 class="page-title">Available Services</h1>

<div class="service-grid">

<div class="service-card" th:each="service : ${services}">

<h3 th:text="${service.serviceType}"></h3>

<p><strong>Provider:</strong> <span th:text="${service.name}"></span></p>

<p><strong>Experience:</strong> 
<span th:text="${service.experience}"></span> years</p>

<div class="card-actions">
<a th:href="@{/booking/form/{partnerId}(partnerId=${service.id})}" class="btn-primary">
Book Now
</a>
</div>

</div>

</div>

</section>

</body>
</html>
