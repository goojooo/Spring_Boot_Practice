<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page">
  <h1 class="page-title">Available Service Providers</h1>
  <div class="service-grid">
    <div th:each="service : ${services}" class="service-card">
      <h3 th:text="${service.serviceType}"></h3>
      <p>Provider: <span th:text="${service.name}"></span></p>
      <p>Experience: <span th:text="${service.experience}"></span> years</p>
      <a th:href="@{/booking/form/{partnerId}(partnerId=${service.id})}" class="btn btn-primary">Book Service</a>
      <a href="/my-bookings" class="btn btn-secondary">My Bookings</a>
    </div>
  </div>
</div>

</body>
</html>
