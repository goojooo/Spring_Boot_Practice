<div class="auth-card">

<h2>Book Service</h2>

<form action="/booking/create" method="post">

<div class="form-group">
<input type="text" name="customerName" placeholder="Your Name">
</div>

<div class="form-group">
<input type="text" name="serviceType" placeholder="Service Type">
</div>

<div class="form-group">
<input type="date" name="bookingDate">
</div>

<input type="hidden" name="partnerId" th:value="${partner.id}">

<button class="btn-primary">Book Service</button>

</form>

</div>
